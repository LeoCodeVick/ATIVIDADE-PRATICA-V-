<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        main {
            width: 100%;
            max-width: 500px;
        }

        img {
            max-width: 100px;
            display: block;
            margin: 0 auto 1rem;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>

<body>
    <main class="container">
        <article>

            <img src="img/Icone.png" alt="Logo">

            <h1>Site Social Ultra</h1>

            <form action="index.html">

                <label for="nome">Nome</label>
                <input type="text" placeholder="Seu nome aqui" required>

                <label for="email">E-mail</label>
                <input type="email" placeholder="Digite seu e-mail" required>

                <label for="usuario">Usuário</label>
                <input type="text" placeholder="Nome do usuário" required>

                <label for="senha">Senha</label>
                <input type="password" placeholder="Digite sua senha" required>

                <label for="confirmar">Confirmar senha</label>
                <input type="password" placeholder="Digite sua senha novamente" required>

                <label>Gênero</label>
                <select required>
                    <option value="" selected disabled>Selecione</option>
                    <option>Masculino</option>
                    <option>Feminino</option>
                    <option>Prefiro não declarar</option>
                </select>

                <label>Data de nascimento</label>
                <input type="date" required>

                <button type="submit">Cadastrar</button>

                <article style="display: flex;
                justify-content: center;
                align-items: center;">
                    <a href="index.html">Ja possuo cadastro</a>
                </article>
            </form>

        </article>
    </main>
</body>

</html>
